<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found (404) - yitumulin</title>
  <meta name="description" content="Page not found. Return home or continue browsing with site search.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <script>
    (function() {
      try {
        var theme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (theme === "dark" || (!theme && prefersDark)) {
          document.body.classList.add("dark");
        }
      } catch (e) {
        console.error("Error applying initial theme:", e);
      }
    })();
  </script>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">yitumulin</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="posts.html">Posts</a>
        <a href="contact.html">Contact</a>
        <a href="wudangdao.html">Listening</a>
      </nav>
      <button id="darkModeToggle" aria-label="Toggle color theme">Theme</button>
    </div>
  </header>

  <main class="page-shell">
    <section class="page-panel" style="text-align: center;">
      <div class="eyebrow">404</div>
      <h1 class="section-title" style="max-width: none;">Page Not Found</h1>
      <p class="lead" style="margin: 1rem auto 0;">The page you are looking for does not exist or may have been moved.</p>
      <div class="hero-actions" style="justify-content: center;">
        <a href="index.html" class="btn btn-primary">Back Home</a>
        <a href="search.html" class="btn">Search the Site</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>yitumulin</p>
      <p class="footer-links"><a href="archives.html">Archives</a> · <a href="search.html">Search</a></p>
    </div>
  </footer>

  <script src="darkmode.js"></script>
</body>
</html>
