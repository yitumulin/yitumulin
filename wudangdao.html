  <meta name="viewport" content="width=device-width, initial-scale=1">

      c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};

<body>
  <script>
    (function() {
      try {
        var theme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (theme === "dark" || (!theme && prefersDark)) {
          document.body.classList.add("dark");
        }
      } catch (e) {
        console.error("Error applying initial theme:", e);
      }
    })();
  </script>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">yitumulin</a>
      <nav class="site-nav">
        <a href="index.html">首页</a>
        <a href="about.html">关于</a>
        <a href="posts.html">项目</a>
        <a href="wudangdao.html">听书</a>
        <a href="contact.html">联系</a>
      </nav>
      <button id="darkModeToggle" aria-label="Toggle color theme">Theme</button>
    </div>
  </header>

  <main class="page-shell listening-shell">
    <section class="page-panel listening-hero">
      <div class="eyebrow">Listening</div>
      <h1 class="section-title">吾当道</h1>
      <p class="lead">这是一个面向长期收听场景的听书页面，支持分集搜索、分页浏览与断点续播。</p>
    </section>

    <section class="listening-layout">
      <div class="listening-column">
        <article class="card-panel player-shell">
          <div class="current-track">
            <h3 id="currentTrackTitle">请选择一集开始播放</h3>
            <p id="episodeProgress" class="episode-progress">共 0 集</p>
          </div>

          <div class="audio-player">
            <audio id="audioPlayer" controls>
              当前浏览器不支持音频播放。
            </audio>
          </div>

          <div class="play-controls">
            <button class="control-btn" onclick="playPrevious()">上一集</button>
            <button class="control-btn" onclick="playNextAudio()">下一集</button>
          </div>
        </article>

        <article class="card-panel mini-panel">
          <h3>使用说明</h3>
          <ul class="note-list">
            <li><strong>搜索</strong>：输入关键词快速定位分集。</li>
            <li><strong>续播</strong>：自动记录上次播放位置。</li>
            <li><strong>连播</strong>：当前集播放结束后自动进入下一集。</li>
          </ul>
        </article>
      </div>

      <div class="listening-column">
        <article class="card-panel library-shell">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索分集">
          </div>

          <div class="audio-list" id="audioList">
            <div class="loading">正在加载音频列表...</div>
          </div>

          <div class="pagination" id="pagination" style="display: none;">
            <button id="prevBtn" onclick="previousPage()">上一页</button>
            <span class="page-info" id="pageInfo">第 1 页 / 共 1 页</span>
            <button id="nextBtn" onclick="nextPage()">下一页</button>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>yitumulin</p>
      <p class="footer-links"><a href="archives.html">Archives</a> · <a href="search.html">Search</a></p>
    </div>
  </footer>

  <script src="darkmode.js"></script>
  <script>
    const R2_BASE = "https://audio.yitumulin.com";
    const ITEMS_PER_PAGE = 30;

    let audioList = [];
    let filteredFiles = [];
    let currentIndex = -1;
    let currentPage = 1;

    const audioEl = document.getElementById("audioPlayer");
    const titleEl = document.getElementById("currentTrackTitle");
    const progressEl = document.getElementById("episodeProgress");
    const listContainer = document.getElementById("audioList");
    const searchInput = document.getElementById("searchInput");
    const paginationEl = document.getElementById("pagination");

    function getEpisodeNumber(item, fallback) {
      const source = [item && item.title, item && item.file].filter(Boolean).join(" ");
      const match = source.match(/\d+/);
      return match ? parseInt(match[0], 10) : fallback;
    }

    function updateProgressLabel(index) {
      if (index < 0 || index >= audioList.length) {
        progressEl.textContent = "共 " + audioList.length + " 集";
        return;
      }

      const episodeNumber = getEpisodeNumber(audioList[index], index + 1);
      progressEl.textContent = "第 " + episodeNumber + " 集 / 共 " + audioList.length + " 集";
    }

    function savePlayProgress() {
      if (currentIndex < 0) return;
      localStorage.setItem("lastPlayedIndex", String(currentIndex));
      localStorage.setItem("lastPlayedTime", String(audioEl.currentTime || 0));
    }

    async function setTrack(index, autoplay) {
      if (index < 0 || index >= audioList.length) return;

      currentIndex = index;
      const item = audioList[index];
      const trackTitle = item.title || "未命名分集";
      titleEl.textContent = trackTitle;
      titleEl.style.color = "";
      updateProgressLabel(index);
      setPlayingUI(index);
      renderList(filteredFiles);

      audioEl.src = R2_BASE + "/" + encodeURI(item.file);

      const savedTime = localStorage.getItem("lastPlayedTime");
      if (!autoplay && savedTime && Number.isFinite(Number(savedTime))) {
        const applyTime = function() {
          audioEl.currentTime = Number(savedTime);
          audioEl.removeEventListener("loadedmetadata", applyTime);
        };
        audioEl.addEventListener("loadedmetadata", applyTime);
      }

      savePlayProgress();

      if (autoplay) {
        try {
          await audioEl.play();
        } catch (e) {
          console.error("Autoplay blocked:", e);
        }
      }
    }

    function setPlayingUI(index) {
      document.querySelectorAll(".play-btn").forEach(function(button) {
        button.classList.remove("playing");
      });

      const activeButton = listContainer.querySelector('.play-btn[data-index="' + index + '"]');
      if (activeButton) {
        activeButton.classList.add("playing");
      }
    }

    function renderList(list) {
      listContainer.innerHTML = "";

      if (!list.length) {
        listContainer.innerHTML = '<div class="loading">没有匹配到相关分集。</div>';
        paginationEl.style.display = "none";
        return;
      }

      const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
      const currentPageFiles = list.slice(startIndex, startIndex + ITEMS_PER_PAGE);

      currentPageFiles.forEach(function(item) {
        const actualIndex = audioList.indexOf(item);
        const card = document.createElement("div");
        card.className = "audio-item";
        if (actualIndex === currentIndex) {
          card.classList.add("playing");
        }

        card.innerHTML = [
          "<h4>" + (item.title || "未命名分集") + "</h4>",
          "<p>第 " + getEpisodeNumber(item, actualIndex + 1) + " 集</p>",
          '<button class="play-btn' + (actualIndex === currentIndex ? " playing" : "") + '" data-index="' + actualIndex + '">',
          actualIndex === currentIndex ? "播放中" : "播放",
          "</button>"
        ].join("");

        listContainer.appendChild(card);
      });

      listContainer.querySelectorAll(".play-btn").forEach(function(button) {
        button.addEventListener("click", function(event) {
          const index = Number(event.currentTarget.dataset.index);
          setTrack(index, true);
        });
      });
    }

    function updatePagination() {
      const totalPages = Math.max(1, Math.ceil(filteredFiles.length / ITEMS_PER_PAGE));
      const pageInfo = document.getElementById("pageInfo");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");

      pageInfo.textContent = "第 " + currentPage + " 页 / 共 " + totalPages + " 页";
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
      paginationEl.style.display = filteredFiles.length ? "flex" : "none";
    }

    function previousPage() {
      if (currentPage === 1) return;
      currentPage -= 1;
      renderList(filteredFiles);
      updatePagination();
    }

    function nextPage() {
      const totalPages = Math.max(1, Math.ceil(filteredFiles.length / ITEMS_PER_PAGE));
      if (currentPage >= totalPages) return;
      currentPage += 1;
      renderList(filteredFiles);
      updatePagination();
    }

    function playNextAudio() {
      if (currentIndex + 1 < audioList.length) {
        setTrack(currentIndex + 1, true);
      } else {
        titleEl.textContent = "已经是最后一集。";
        titleEl.style.color = "#376c43";
      }
    }

    function playPrevious() {
      if (currentIndex > 0) {
        setTrack(currentIndex - 1, true);
      } else {
        titleEl.textContent = "已经是第一集。";
        titleEl.style.color = "#376c43";
      }
    }

    function restorePlayProgress() {
      const lastIndex = Number(localStorage.getItem("lastPlayedIndex"));
      if (!Number.isInteger(lastIndex) || lastIndex < 0 || lastIndex >= audioList.length) {
        updateProgressLabel(-1);
        return;
      }
      setTrack(lastIndex, false);
    }

    async function loadList() {
      try {
        const response = await fetch("audio_list.json", { cache: "no-cache" });
        const data = await response.json();
        audioList = Array.isArray(data) ? data : [];
        filteredFiles = audioList.slice();
        currentPage = 1;

        renderList(filteredFiles);
        updatePagination();
        restorePlayProgress();
        updateProgressLabel(currentIndex);
      } catch (error) {
        console.error("Failed to load audio list:", error);
        listContainer.innerHTML = '<div class="error-message">音频列表加载失败，请稍后重试。</div>';
      }
    }

    if (searchInput) {
      searchInput.addEventListener("input", function(event) {
        const keyword = event.target.value.trim().toLowerCase();
        filteredFiles = audioList.filter(function(item) {
          return (item.title || "").toLowerCase().includes(keyword) || (item.file || "").toLowerCase().includes(keyword);
        });
        currentPage = 1;
        renderList(filteredFiles);
        updatePagination();
      });
    }

    audioEl.addEventListener("ended", playNextAudio);
    audioEl.addEventListener("timeupdate", savePlayProgress);
    document.addEventListener("DOMContentLoaded", loadList);
  </script>
</body>
</html>
