<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search - yitumulin</title>
  <meta name="description" content="站内搜索：快速查找项目、文章和页面。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <script>
    (function() {
      try {
        var theme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (theme === "dark" || (!theme && prefersDark)) {
          document.body.classList.add("dark");
        }
      } catch (e) {
        console.error("Error applying initial theme:", e);
      }
    })();
  </script>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">yitumulin</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="posts.html">Posts</a>
        <a href="wudangdao.html">Listening</a>
        <a href="contact.html">Contact</a>
      </nav>
      <button id="darkModeToggle" aria-label="Toggle color theme">Theme</button>
    </div>
  </header>

  <main class="page-shell">
    <section class="page-panel">
      <div class="page-intro">
        <div class="eyebrow">Search</div>
        <h1 class="section-title">站内搜索</h1>
        <p class="lead">输入关键词，快速找到项目页、文章页与联系页面。</p>
      </div>

      <div class="search-box" style="max-width: 760px; margin: 1.4rem 0 0;">
        <input type="text" id="searchInput" placeholder="输入关键词，例如 LLM / project / contact">
      </div>
      <div id="searchResults" style="margin-top: 1.2rem;"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>yitumulin</p>
      <p class="footer-links"><a href="archives.html">Archives</a> · <a href="search.html">Search</a></p>
    </div>
  </footer>

  <script src="https://unpkg.com/lunr/lunr.js"></script>
  <script src="search.js"></script>
  <script src="darkmode.js"></script>
</body>
</html>
