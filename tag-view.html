</head>
<body>
  <script>
    (function() {
      try {
        var theme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (theme === "dark" || (!theme && prefersDark)) {
          document.body.classList.add("dark");
        }
      } catch (e) {
        console.error("Error applying initial theme:", e);
      }
    })();
  </script>

  <div id="particles-js" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></div>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">yitumulin</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="posts.html">Posts</a>
        <a href="contact.html">Contact</a>
        <a href="wudangdao.html">Listening</a>
      </nav>
      <button id="darkModeToggle" aria-label="Toggle color theme">Theme</button>
    </div>
  </header>

  <main class="container" style="position: relative; z-index: 1;">
    <h1 id="tag-view-title">Tag View</h1>
    <div id="tag-results-container"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="darkmode.js"></script>
  <script>
    particlesJS("particles-js", {
      "particles": {
        "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": "#ffffff" },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.5 },
        "size": { "value": 3 },
        "line_linked": { "enable": true, "distance": 120, "color": "#ffffff", "opacity": 0.4, "width": 1 },
        "move": { "enable": true, "speed": 2 }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": { "enable": true, "mode": "grab" },
          "onclick": { "enable": true, "mode": "push" },
          "resize": true
        }
      },
      "retina_detect": true
    });

    document.addEventListener("DOMContentLoaded", async function() {
      const resultsContainer = document.getElementById("tag-results-container");
      const pageTitleElement = document.getElementById("tag-view-title");
      if (!resultsContainer || !pageTitleElement) return;

      const params = new URLSearchParams(window.location.search);
      const tagName = params.get("tag");
      const categoryName = params.get("category");
      let filterType = "";
      let filterValue = "";

      if (tagName) {
        filterType = "tag";
        filterValue = tagName;
        pageTitleElement.textContent = "Tag: " + tagName;
      } else if (categoryName) {
        filterType = "category";
        filterValue = categoryName;
        pageTitleElement.textContent = "Category: " + categoryName;
      } else {
        pageTitleElement.textContent = "Tag View";
        resultsContainer.innerHTML = "<p>Please provide <code>?tag=...</code> or <code>?category=...</code> in the URL.</p>";
        return;
      }

      try {
        const response = await fetch("search-data.json");
        if (!response.ok) throw new Error("Failed to load search-data.json");
        const allPosts = await response.json();
        const legacyTagAlias = {
          "浜哄伐鏅鸿兘": "AI",
          "绉戠爺": "Research",
          "鍋ュ悍绉戞妧": "HealthTech"
        };
        const normalizedFilterValue = filterType === "tag" && legacyTagAlias[filterValue]
          ? legacyTagAlias[filterValue]
          : filterValue;
        const target = normalizedFilterValue.toLowerCase();
        if (normalizedFilterValue !== filterValue) {
          pageTitleElement.textContent = "Tag: " + normalizedFilterValue;
        }

        const filteredPosts = allPosts.filter(function(post) {
          if (filterType === "tag") {
            return Array.isArray(post.tags) && post.tags.some(function(tag) {
              return String(tag).toLowerCase() === target;
            });
          }
          return String(post.category || "").toLowerCase() === target;
        });

        if (filteredPosts.length === 0) {
          resultsContainer.innerHTML = "<p>No items found for " + filterType + ': "' + normalizedFilterValue + "\".</p>";
          return;
        }

        const ul = document.createElement("ul");
        ul.className = "post-list";
        filteredPosts.forEach(function(post) {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = post.url;
          a.textContent = post.title;
          li.appendChild(a);
          if (post.date) {
            const span = document.createElement("span");
            span.textContent = post.date;
            li.appendChild(span);
          }
          ul.appendChild(li);
        });
        resultsContainer.appendChild(ul);
      } catch (error) {
        console.error("Error rendering tag/category view:", error);
        resultsContainer.innerHTML = "<p>Something went wrong while loading the list.</p>";
      }
    });
  </script>
</body>
</html>
